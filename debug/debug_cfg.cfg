[folders]
csv_files_folder = ../SUBARU_OUTBACK
models_folder = ../models
output_folder = output
scores_filename = "analysis_scores.csv"

[data]
time_column = time
columns_to_remove = Steer_Error_1, Steer_Error_2, name, log_name, addr, fileID

[trainer]
tt_split= 0.7
label_column = Steer_Warning
use_timeseries = False
supervised = True

[algs]
sup_algs = DT, RF, XGB
uns_algs = MCD, HBOS, COPOD, CBLOF

[random]
rng_seed = 23
rng_state = 42

[debug]
verbose = True
store_models = True
print_scores = True